<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donor Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1615461066841-6116ecaaba30?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 1.25rem;
            max-width: 700px;
            margin: 0 auto 30px;
        }
    </style>
</head>

<body style="display: block;">
    <nav style="background: white; padding: 20px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="color: var(--primary);">BDMS</h2>
            <div>
                <a href="index.html" style="margin-right: 20px; text-decoration: none; color: var(--text);">Home</a>
                <a href="login.html" class="btn btn-primary" style="padding: 8px 25px;">Login</a>
                <a href="register.html" class="btn"
                    style="padding: 8px 25px; border: 1px solid var(--primary); color: var(--primary);">Register</a>
            </div>
        </div>
    </nav>

    <div class="hero-section">
        <div class="hero-content">
            <h1>Save Lives. Donate Blood.</h1>
            <p>Every donation counts. Our platform connects donors with those in urgent need of blood groups in
                real-time during emergencies.</p>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <a href="register.html" class="btn btn-primary" style="padding: 15px 40px; font-size: 1.1rem;">Become a
                    Donor</a>
                <a href="search.html" class="btn"
                    style="background: white; color: var(--primary); padding: 15px 40px; font-size: 1.1rem;">Search
                    Donors</a>
            </div>
        </div>
    </div>
</body>

</html>
