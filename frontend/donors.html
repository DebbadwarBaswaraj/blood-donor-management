<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor List - Blood Donor Management System</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="main-content">
        <div class="content-wrapper">
            <h1 style="margin-bottom: 24px;">Donor Directory</h1>

            <div class="card">
                <div class="card-header" style="flex-wrap: wrap; gap: 15px;">
                    <h3>All Registered Donors</h3>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="adminBloodGroup" class="form-control" placeholder="Search by Blood Group (e.g., A+)" style="min-width: 200px;">
                        <button class="btn btn-primary" onclick="loadAdminDonors()">Filter</button>
                    </div>
                </div>
                <div class="responsive-table">
                    <table id="donorsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Blood Group</th>
                                <th>Phone</th>
                                <th>City</th>
                                <th>Date / Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!checkAuth()) return;
            const user = JSON.parse(localStorage.getItem('user'));
            if (user.role !== 'Admin') {
                alert('Access denied. Admin only.');
                window.location.href = 'dashboard.html';
                return;
            }
            renderSidebar('donors');
            renderNavbar();
            await loadAdminDonors();
        });

        async function loadAdminDonors() {
            try {
                const searchBg = document.getElementById('adminBloodGroup').value.trim();
                let donors = await api.getDonors();
                if (searchBg) {
                    donors = donors.filter(d => d.blood_group.toLowerCase() === searchBg.toLowerCase());
                }

                const tableBody = document.querySelector('#donorsTable tbody');
                tableBody.innerHTML = '';
                
                if (donors.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No donors found.</td></tr>';
                    return;
                }

                donors.forEach(donor => {
                    const row = document.createElement('tr');
                    const isAvailable = donor.availability === 'Available';
                    const lastDashed = donor.last_donation_date ? new Date(donor.last_donation_date).toLocaleDateString() : 'Never';
                    
                    row.innerHTML = `
                        <td>#${donor.donor_id}</td>
                        <td style="font-weight: 600;">${donor.full_name}</td>
                        <td style="font-weight: 800; color: var(--primary);">${donor.blood_group}</td>
                        <td>${donor.phone}</td>
                        <td>${donor.city}</td>
                        <td>
                            <div style="font-size: 0.8rem; margin-bottom: 4px; color: var(--text-muted);">Last: ${lastDashed}</div>
                            <span class="badge ${isAvailable ? 'badge-success' : 'badge-danger'}">${donor.availability}</span>
                        </td>
                        <td>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn" style="padding: 4px 10px; font-size: 0.75rem; background: ${isAvailable ? '#c53030' : '#2f855a'}; color: white;" 
                                    onclick="toggleStatus(${donor.donor_id}, '${isAvailable ? 'Not Available' : 'Available'}')">
                                    ${isAvailable ? 'Set Inactive' : 'Set Active'}
                                </button>
                                <button class="btn" style="padding: 4px 10px; font-size: 0.75rem; background: #e2e8f0; color: #1a202c;" onclick="openInMaps('${donor.address}', '${donor.city}', '${donor.state}')">View</button>
                                <button class="btn badge-danger" style="padding: 4px 10px; font-size: 0.75rem;" onclick="deleteDonorObj(${donor.donor_id})">🗑️</button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (err) {
                console.error('Failed to load donors:', err);
            }
        }

        async function toggleStatus(id, status) {
            if (confirm(`Change this donor's status to ${status}?`)) {
                await api.updateDonorStatus(id, status);
                loadAdminDonors();
            }
        }

        async function deleteDonorObj(id) {
            if (confirm('Are you absolutely sure you want to delete this donor? This action cannot be undone.')) {
                await api.deleteDonor(id);
                loadAdminDonors();
            }
        }
    </script>
</body>

</html>
