<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blood Donor Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #f3f4f6;">
    <div class="form-container"
        style="width: 100%; max-width: 450px; background: white; padding: 40px; border-radius: 12px; box-shadow: var(--shadow-md);">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="color: var(--primary); font-size: 2.5rem; margin-bottom: 10px;">BDMS</h1>
            <h2 style="color: var(--secondary);">Welcome Back</h2>
            <p style="color: var(--text-muted);">Please enter your credentials to login</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">Login to
                Dashboard</button>
            <div id="message" class="error" style="text-align: center; margin-top: 15px;"></div>
        </form>

        <p style="margin-top: 25px; text-align: center; color: var(--text-muted);">
            Don't have an account? <a href="register.html"
                style="color: var(--primary); text-decoration: none; font-weight: 600;">Register here</a>
        </p>

        <div style="margin-top: 20px; text-align: center;">
            <a href="index.html" style="font-size: 0.875rem; color: var(--text-muted); text-decoration: none;">← Back to
                Home</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const data = await api.login({ email, password });
                if (data.error) {
                    messageDiv.textContent = data.error;
                    messageDiv.style.color = 'red';
                } else {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.error('Login Error:', err);
                messageDiv.textContent = 'Connection Error: Could not reach the backend. Check if the backend is awake or CORS is configured correctly.';
                messageDiv.style.color = 'red';
            }
        });
    </script>
</body>

</html>
