<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Blood Donor Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body style="display: block; background: #f3f4f6;">
    <header style="background: var(--primary); color: white; padding: 20px; text-align: center;">
        <h1>Blood Donor Management System</h1>
    </header>

    <div class="form-container"
        style="max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: var(--shadow-md);">
        <h2 style="margin-bottom: 30px; text-align: center;">Create Your Account</h2>
        <form id="registerForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role" class="form-control" onchange="toggleDonorFields()">
                        <option value="User">User</option>
                        <option value="Donor">Donor</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
            </div>

            <div id="donorFields" class="hidden"
                style="margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 30px;">
                <h3 style="margin-bottom: 20px; color: var(--primary);">Donor Profile Details</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="full_name" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="phone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Blood Group</label>
                        <select id="blood_group" class="form-control">
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender" class="form-control">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="city" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <input type="text" id="state" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Last Donation Date</label>
                        <input type="date" id="last_donation_date" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address" class="form-control" rows="3"></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Register
                Account</button>
            <div id="message" class="error" style="text-align: center; margin-top: 15px;"></div>
        </form>
        <p style="margin-top: 20px; text-align: center; color: var(--text-muted);">
            Already have an account? <a href="login.html"
                style="color: var(--primary); text-decoration: none; font-weight: 600;">Login here</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script>
        function toggleDonorFields() {
            const role = document.getElementById('role').value;
            const donorFields = document.getElementById('donorFields');
            if (role === 'Donor') {
                donorFields.classList.remove('hidden');
            } else {
                donorFields.classList.add('hidden');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const role = document.getElementById('role').value;
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: role
            };

            if (role === 'Donor') {
                userData.donorDetails = {
                    full_name: document.getElementById('full_name').value,
                    phone: document.getElementById('phone').value,
                    blood_group: document.getElementById('blood_group').value,
                    age: document.getElementById('age').value,
                    gender: document.getElementById('gender').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    state: document.getElementById('state').value,
                    last_donation_date: document.getElementById('last_donation_date').value,
                    availability: 'Available'
                };
            }

            const messageDiv = document.getElementById('message');

            try {
                const data = await api.register(userData);
                if (data.error) {
                    messageDiv.textContent = data.error;
                    messageDiv.style.color = 'red';
                } else {
                    alert('Registration successful! Please login.');
                    window.location.href = 'login.html';
                }
            } catch (err) {
                console.error('Registration Error:', err);
                messageDiv.textContent = 'Connection Error: Could not reach the backend. Check if the backend is awake or CORS is configured correctly.';
                messageDiv.style.color = 'red';
            }
        });
    </script>
</body>

</html>
